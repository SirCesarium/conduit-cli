[package]
name = "conduit-cli"
version = "0.1.0"
edition = "2024"

[dependencies]
async-recursion = "1.1.1"
clap = { version = "4.5.60", features = ["derive"] }
comfy-table = "7.2.2"
console = "0.16.2"
dirs = "6.0.0"
futures-util = "0.3.32"
indicatif = "0.18.4"
inquire = "0.9.4"
reqwest = { version = "0.13.2", features = ["json", "rustls", "stream"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
sha2 = "0.10.9"
tokio = { version = "1.50.0", features = ["full"] }
toml = "1.0.3"
zip = "8.2.0"

[[bin]]
name = "conduit"
path = "src/main.rs"
