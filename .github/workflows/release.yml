name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-upload:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: conduit
            release_name: conduit-linux-amd64
            use_cross: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact_name: conduit
            release_name: conduit-linux-musl-amd64
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: conduit
            release_name: conduit-linux-arm64
            use_cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: conduit.exe
            release_name: conduit-windows-amd64.exe
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: conduit
            release_name: conduit-macos-arm64
            use_cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: conduit
            release_name: conduit-macos-intel
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install MUSL Tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross.git

      - name: Build Binary
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --features cli
          else
            cargo build --release --target ${{ matrix.target }} --features cli
          fi
        shell: bash

      - name: Create Packages
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cargo install cargo-wix
            cargo wix --no-build --target ${{ matrix.target }} --features cli
            cp target/wix/*.msi target/${{ matrix.target }}/release/
          fi
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then
            cargo install cargo-deb cargo-generate-rpm
            cargo deb --no-build --target ${{ matrix.target }} -- --features cli
            cargo generate-rpm --target ${{ matrix.target }} --features cli
            cp target/${{ matrix.target }}/debian/*.deb target/${{ matrix.target }}/release/
            cp target/${{ matrix.target }}/generate-rpm/*.rpm target/${{ matrix.target }}/release/
          fi
        shell: bash
        continue-on-error: true

      - name: Prepare Artifact
        run: |
          cd target/${{ matrix.target }}/release
          mv ${{ matrix.artifact_name }} ${{ matrix.release_name }}
        shell: bash

      - name: Release Binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/${{ matrix.target }}/release/${{ matrix.release_name }}
            target/${{ matrix.target }}/release/*.msi
            target/${{ matrix.target }}/release/*.deb
            target/${{ matrix.target }}/release/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to Crates.io
    needs: build-and-upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Cargo Publish
        run: cargo publish --token ${{ secrets.CRATES_TOKEN }}
        continue-on-error: true
